<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="pie-asset-version" content="browser-dev" />
  <link href="./panel.css" rel="stylesheet" />
  <title>pie webview dev</title>
  <style>
    :root {
      color-scheme: dark;
      --vscode-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --vscode-font-size: 13px;
      --vscode-editor-font-family: "Cascadia Code", Consolas, monospace;
      --vscode-foreground: #cccccc;
      --vscode-descriptionForeground: #9d9d9d;
      --vscode-sideBar-background: #181818;
      --vscode-sideBarSectionHeader-background: rgba(255, 255, 255, 0.055);
      --vscode-editor-background: #1f1f1f;
      --vscode-editorWidget-background: #252526;
      --vscode-input-background: #242424;
      --vscode-panel-border: rgba(255, 255, 255, 0.13);
      --vscode-list-hoverBackground: rgba(255, 255, 255, 0.08);
      --vscode-focusBorder: #2f81f7;
      --vscode-button-background: #0e639c;
      --vscode-button-foreground: #ffffff;
      --vscode-button-hoverBackground: #1177bb;
      --vscode-errorForeground: #f48771;
      --vscode-inputValidation-errorBackground: rgba(244, 135, 113, 0.12);
      --vscode-inputValidation-warningBackground: rgba(210, 153, 34, 0.13);
      --vscode-inputValidation-warningBorder: #d29922;
      --vscode-testing-iconPassed: #3fb950;
      --vscode-textCodeBlock-background: rgba(255, 255, 255, 0.08);
      --vscode-scrollbarSlider-background: rgba(121, 121, 121, 0.4);
      --vscode-scrollbarSlider-hoverBackground: rgba(100, 100, 100, 0.7);
      --vscode-widget-shadow: rgba(0, 0, 0, 0.42);
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --vscode-foreground: #1f2328;
      --vscode-descriptionForeground: #636c76;
      --vscode-sideBar-background: #f6f8fa;
      --vscode-sideBarSectionHeader-background: rgba(31, 35, 40, 0.055);
      --vscode-editor-background: #ffffff;
      --vscode-editorWidget-background: #ffffff;
      --vscode-input-background: #ffffff;
      --vscode-panel-border: rgba(31, 35, 40, 0.14);
      --vscode-list-hoverBackground: rgba(31, 35, 40, 0.06);
      --vscode-focusBorder: #0969da;
      --vscode-button-background: #0969da;
      --vscode-button-foreground: #ffffff;
      --vscode-button-hoverBackground: #0759ba;
      --vscode-errorForeground: #cf222e;
      --vscode-inputValidation-errorBackground: rgba(207, 34, 46, 0.08);
      --vscode-inputValidation-warningBackground: rgba(154, 103, 0, 0.11);
      --vscode-inputValidation-warningBorder: #9a6700;
      --vscode-testing-iconPassed: #1a7f37;
      --vscode-textCodeBlock-background: rgba(175, 184, 193, 0.2);
      --vscode-scrollbarSlider-background: rgba(31, 35, 40, 0.22);
      --vscode-scrollbarSlider-hoverBackground: rgba(31, 35, 40, 0.34);
      --vscode-widget-shadow: rgba(31, 35, 40, 0.22);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./dev.js"></script>
</body>
</html>
